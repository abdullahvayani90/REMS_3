<!-- rems/index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>REMS  Admin Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="page-login">
  <main class="login-container">
    <section class="brand">
      <h1>REMS</h1>
      <p>Real Estate Management System</p>
    </section>

    <section class="login-card card">
      <h2>Admin Login</h2>

      <form id="loginForm" class="form">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="admin" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="••••••••" required />
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary">Sign in</button>
        </div>

      </form>

      <div id="loginError" class="error-msg" aria-live="polite" hidden></div>
    </section>

    <p style="text-align: center; color: #777; margin-top: 20px;">&copy; <span id="year"></span> REMS. All rights reserved.</p>

  </main>
  </main>

  <script>
    // small inline helper: show current year
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>

  <!-- Main application logic (shared across pages) -->
  <script src="js/app.js"></script> 


  <script>
    // Login handling (delegates to functions in app.js if present)
    const form = document.getElementById('loginForm');
    const errEl = document.getElementById('loginError');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const u = document.getElementById('username').value.trim();
      const p = document.getElementById('password').value;

      // If app.js exposes checkAdminCredentials, use it; otherwise use default
      if (typeof checkAdminCredentials === 'function') {
        const ok = checkAdminCredentials(u, p);
        if (ok) {
          // mark session and go to dashboard
          sessionStorage.setItem('rems_logged_in', 'true');
          globalThis.location.href = 'dashboard.html';
        } else {
          errEl.hidden = false;
          errEl.textContent = 'Invalid username or password.';
        }
      } else if (u === 'admin' && p === 'admin123') {
  sessionStorage.setItem('rems_logged_in', 'true');
  globalThis.location.href = 'dashboard.html';
} else {
  errEl.hidden = false;
  errEl.textContent = 'Invalid username or password.';
}
    });
  </script>
</body>
</html>
