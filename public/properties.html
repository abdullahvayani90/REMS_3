<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Properties - REMS V2</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<script>
  if (sessionStorage.getItem("rems_logged_in") !== "true") {
    window.location.href = "index.html";
  }
</script>

<div class="layout">
  <aside class="sidebar">
    <h2>REMS V2</h2>
    <nav class="sidebar-nav">
      <a href="dashboard.html"> Dashboard</a>
      <a href="properties.html" style="background: rgba(255,255,255,0.18);"> Property Management</a>
      <a href="transactions.html"> Transactions (Deals)</a>
      <a href="customers.html"> Clients Directory</a>
      <a href="reports.html"> Reports</a>
      <a href="meetings.html"> Meetings </a>
      <a href="#" onclick="logout()"> Logout</a>
    </nav>
  </aside>

  <main class="main">
    <h1 class="page-title">Property Inventory</h1>

    <div class="form-card card">
      <h2>Add New Property</h2>
      
      <div class="form-row">
        <input type="text" id="p_type" placeholder="Property Type (e.g., House, Plot, Flat)">
        <input type="text" id="p_area" placeholder="Area (e.g., Gulshan, DHA)">
      </div>

      <div class="form-row">
        <input type="text" id="p_address" placeholder="Complete Address / Plot No.">
        <input type="text" id="p_dimensions" placeholder="Dimensions (e.g., 200 Sq Yd)">
      </div>

      <div class="form-row">
        <input type="number" id="p_price" placeholder="Demand Price (Rs)">
      </div>

      <h3 style="margin-top: 15px; margin-bottom: 10px; color: #2c3e50; border-bottom: 1px solid #eee; padding-bottom: 5px;">Owner / Seller Details</h3>
      <div class="form-row">
        <input type="text" id="p_ownerName" placeholder="Owner Full Name">
        <input type="text" id="p_ownerPhone" placeholder="Owner Phone (Will link automatically if exists)">
      </div>

      <button class="btn-primary" style="margin-top: 10px;" onclick="handleAddPropertyV2()">Save Property & Link Owner</button>
      <button class="btn-secondary" style="margin-top: 45px; float: right;" onclick="undo()">Undo Last Delete</button>
    </div>

    <div class="table-container card" style="margin-top:20px;">
      <h2>Current Listings</h2>
      <div class="search-container" style="margin-bottom: 15px; margin-top: 10px;">
        <input type="text" id="searchProperty" onkeyup="handlePropertySearch()" placeholder="Search by Area, Address, Type or ID...">
      </div>
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Type</th>
            <th>Area</th>
            <th>Address</th>
            <th>Dimensions</th>
            <th>Price</th>
            <th>Owner Info</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="propertyTable">
          </tbody>
      </table>
    </div>
  </main>
</div>

<script src="js/app.js"></script>

<script>
  // V2 Add Property Handler
  function handleAddPropertyV2() {
    const type = document.getElementById("p_type").value.trim();
    const area = document.getElementById("p_area").value.trim();
    const address = document.getElementById("p_address").value.trim();
    const dimensions = document.getElementById("p_dimensions").value.trim();
    const price = document.getElementById("p_price").value.trim();
    const ownerName = document.getElementById("p_ownerName").value.trim();
    const ownerPhone = document.getElementById("p_ownerPhone").value.trim();

    if (!type || !area || !price || !ownerName || !ownerPhone) {
      alert("Property Type, Area, Price, Owner Name, and Owner Phone are mandatory!");
      return;
    }

    addPropertyV2(type, area, address, dimensions, price, ownerName, ownerPhone);
  }

  function handleDelete(id) {
    if (confirm("Are you sure you want to delete this property?")) {
      deleteProperty(id);
    }
  }
</script>

</body>
</html>
